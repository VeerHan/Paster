name: Paster
options:
  bundleIdPrefix: com.veerhan
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0.3"
    CURRENT_PROJECT_VERSION: "2"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    MACOSX_DEPLOYMENT_TARGET: "13.0"

targets:
  Paster:
    type: application
    platform: macOS
    sources:
      - path: Paster
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_NAME: Paster
        PRODUCT_BUNDLE_IDENTIFIER: com.veerhan.paster
        INFOPLIST_FILE: Paster/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        COMBINE_HIDPI_IMAGES: YES
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
        ENABLE_HARDENED_RUNTIME: NO
        NSPrincipalClass: NSApplication
    entitlements:
      path: Paster/Resources/Paster.entitlements
